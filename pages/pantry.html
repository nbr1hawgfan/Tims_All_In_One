<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pantry Scanner — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
<script defer src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,40,50,0.5); display: none;
    align-items: flex-start; justify-content: center; z-index: 50; padding: 20px 0; overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; width: 92%; max-width: 480px; }
  .low-badge { background: var(--danger-wash); color: var(--danger); }
  .scan-status { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }
  .qty-stepper { display: flex; align-items: center; gap: 10px; }
  .qty-stepper button { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 1.1rem; font-weight: 700; cursor: pointer; color: var(--primary-dark); }
  .qty-stepper .qty-num { font-family: var(--font-mono); font-size: 1.1rem; min-width: 28px; text-align: center; }
  #reader { width: 100%; border-radius: var(--radius-md); overflow: hidden; margin-bottom: 12px; background: #000; min-height: 260px; }
  #reader video { border-radius: var(--radius-md); width: 100% !important; }
  .scan-frame-wrap { position: relative; }
  .scan-reticle {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 260px; height: 140px; max-width: 78%;
    border: 3px solid rgba(255,255,255,0.9); border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  .manual-barcode-row { margin: 4px 0 8px; }
  .manual-barcode-row input { margin-bottom: 8px; }
</style>
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Pantry Scanner</h1></div>
</header>

<main class="shell">
  <div class="btn-row" style="margin-bottom:18px;">
    <button class="btn" id="scan-btn" style="flex:1;">📷 Scan barcode</button>
    <button class="btn secondary" id="manual-btn" style="flex:1;">+ Add manually</button>
  </div>

  <div class="row-list" id="pantry-list"></div>
</main>

<!-- Camera scan modal -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal-box">
    <h3>Scan a barcode</h3>
    <div class="scan-status" id="scan-status">Point your camera at the barcode</div>
    <div class="scan-frame-wrap">
      <div id="reader"></div>
      <div class="scan-reticle" aria-hidden="true"></div>
    </div>
    <p class="helper-text" style="text-align:center; margin-top:-4px;">Hold steady, about 4–6 inches away, with good lighting.</p>
    <div class="manual-barcode-row">
      <input type="text" id="manual-barcode-input" inputmode="numeric" placeholder="Or type the barcode number">
      <button class="btn secondary block" id="manual-barcode-btn" type="button">Look up this number</button>
    </div>
    <button class="btn secondary block" id="scan-cancel-btn">Cancel</button>
  </div>
</div>

<!-- Add/edit item modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal-box">
    <h3 id="item-modal-title">Add pantry item</h3>
    <div id="item-photo-wrap" style="display:none; margin-bottom:12px;">
      <img id="item-photo" style="width:64px; height:64px; border-radius:10px; object-fit:cover;">
    </div>
    <div id="off-search-wrap">
      <label for="off-search-input">Search product database (optional)</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="off-search-input" placeholder="e.g. peanut butter" style="margin-bottom:0;">
        <button class="btn secondary" id="off-search-btn" type="button" style="flex-shrink:0;">Search</button>
      </div>
      <div class="row-list" id="off-search-results" style="margin-top:10px;"></div>
      <hr class="divider">
    </div>
    <label for="item-name">Item name</label>
    <input type="text" id="item-name" placeholder="e.g. Peanut butter">
    <label for="item-brand">Brand (optional)</label>
    <input type="text" id="item-brand" placeholder="e.g. Jif">
    <label for="item-category">Category</label>
    <select id="item-category">
      <option>Canned goods</option>
      <option>Dry goods &amp; grains</option>
      <option>Baking</option>
      <option>Condiments &amp; sauces</option>
      <option>Snacks</option>
      <option>Beverages</option>
      <option>Frozen</option>
      <option>Household</option>
      <option>Other</option>
    </select>
    <label>Quantity on hand</label>
    <div class="qty-stepper" style="margin-bottom:14px;">
      <button type="button" id="qty-minus">−</button>
      <div class="qty-num" id="qty-num">1</div>
      <button type="button" id="qty-plus">+</button>
    </div>
    <div class="toggle-row" style="display:flex; align-items:center; justify-content:space-between; padding: 6px 0 16px;">
      <span>Mark as running low</span>
      <input type="checkbox" id="item-lowstock">
    </div>
    <div id="item-nutrition-panel" style="display:none; background: var(--surface-sunken); border-radius: var(--radius-md); padding: 14px; margin-bottom:16px;">
      <div class="shelf-label" style="margin-bottom:8px;">From Open Food Facts</div>
      <div id="allergen-chips" style="margin-bottom:8px;"></div>
      <div id="nutrition-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:8px;"></div>
      <div id="ingredients-text" class="helper-text" style="margin:0;"></div>
    </div>
    <div class="btn-row">
      <button class="btn secondary" id="item-cancel-btn" style="flex:1;">Cancel</button>
      <button class="btn danger" id="item-delete-btn" style="display:none;">Delete</button>
      <button class="btn" id="item-save-btn" style="flex:1;">Save</button>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script>
  let editingId = null;
  let pendingBarcode = null;
  let pendingImage = null;
  let pendingNutrition = null;
  let pendingIngredients = null;
  let pendingAllergens = null;
  let qty = 1;

  const itemModal = document.getElementById('item-modal');
  const scanModal = document.getElementById('scan-modal');

  function updateQtyDisplay() { document.getElementById('qty-num').textContent = qty; }
  document.getElementById('qty-minus').addEventListener('click', () => { qty = Math.max(0, qty - 1); updateQtyDisplay(); });
  document.getElementById('qty-plus').addEventListener('click', () => { qty += 1; updateQtyDisplay(); });

  function openItemModal(item = null) {
    editingId = item ? item.id : null;
    pendingBarcode = item ? item.barcode : pendingBarcode;
    pendingImage = item ? item.imageDataUrl : pendingImage;
    pendingNutrition = item ? (item.nutrition || null) : pendingNutrition;
    pendingIngredients = item ? (item.ingredientsText || null) : pendingIngredients;
    pendingAllergens = item ? (item.allergens || null) : pendingAllergens;
    document.getElementById('item-modal-title').textContent = item ? 'Edit pantry item' : 'Add pantry item';
    document.getElementById('item-name').value = item ? item.name : '';
    document.getElementById('item-brand').value = item ? (item.brand || '') : '';
    document.getElementById('item-category').value = item ? item.category : 'Canned goods';
    qty = item ? item.qty : 1;
    updateQtyDisplay();
    document.getElementById('item-lowstock').checked = item ? !!item.lowStock : false;
    document.getElementById('item-delete-btn').style.display = item ? '' : 'none';
    document.getElementById('off-search-wrap').style.display = item ? 'none' : '';
    document.getElementById('off-search-input').value = '';
    document.getElementById('off-search-results').innerHTML = '';
    const photoWrap = document.getElementById('item-photo-wrap');
    if (pendingImage) {
      document.getElementById('item-photo').src = pendingImage;
      photoWrap.style.display = '';
    } else {
      photoWrap.style.display = 'none';
    }
    renderNutritionPanel();
    itemModal.classList.add('show');
  }
  function closeItemModal() {
    itemModal.classList.remove('show');
    pendingBarcode = null;
    pendingImage = null;
    pendingNutrition = null;
    pendingIngredients = null;
    pendingAllergens = null;
  }

  function renderNutritionPanel() {
    const panel = document.getElementById('item-nutrition-panel');
    const hasData = pendingNutrition || pendingIngredients || (pendingAllergens && pendingAllergens.length);
    if (!hasData) { panel.style.display = 'none'; return; }
    panel.style.display = '';

    const chipsEl = document.getElementById('allergen-chips');
    chipsEl.innerHTML = (pendingAllergens && pendingAllergens.length)
      ? `<span class="chip danger">⚠ Contains: ${pendingAllergens.map(toolkitEscapeHtml).join(', ')}</span>`
      : '';

    const gridEl = document.getElementById('nutrition-grid');
    if (pendingNutrition) {
      const n = pendingNutrition;
      const rows = [
        ['Calories', n.calories, ''],
        ['Protein', n.protein, 'g'],
        ['Carbs', n.carbs, 'g'],
        ['Sugar', n.sugar, 'g'],
        ['Fat', n.fat, 'g'],
        ['Sodium', n.sodium != null ? n.sodium * 1000 : null, 'mg'],
      ].filter(([, v]) => v != null && !isNaN(v));
      const header = `<div style="grid-column:1/-1; font-size:0.7rem; color:var(--text-muted);">Per 100g${n.servingSize ? ' · serving: ' + toolkitEscapeHtml(n.servingSize) : ''}</div>`;
      const cells = rows.map(([label, val, unit]) => `
        <div style="text-align:center;">
          <div class="mono" style="font-weight:600; color:var(--primary-dark);">${Number(val).toFixed(val < 10 ? 1 : 0)}${unit}</div>
          <div class="row-sub" style="font-size:0.68rem;">${label}</div>
        </div>
      `).join('');
      gridEl.innerHTML = rows.length ? header + cells : '';
    } else {
      gridEl.innerHTML = '';
    }

    document.getElementById('ingredients-text').textContent = pendingIngredients ? 'Ingredients: ' + pendingIngredients : '';
  }

  document.getElementById('manual-btn').addEventListener('click', () => openItemModal());
  document.getElementById('item-cancel-btn').addEventListener('click', closeItemModal);
  itemModal.addEventListener('click', (e) => { if (e.target === itemModal) closeItemModal(); });

  document.getElementById('off-search-btn').addEventListener('click', searchOpenFoodFacts);
  document.getElementById('off-search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); searchOpenFoodFacts(); }
  });

  async function searchOpenFoodFacts() {
    const term = document.getElementById('off-search-input').value.trim();
    const resultsEl = document.getElementById('off-search-results');
    if (!term) { toolkitToast('Type something to search for', { danger: true }); return; }
    resultsEl.innerHTML = `<div class="empty-state"><p>Searching…</p></div>`;
    try {
      const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(term)}&search_simple=1&action=process&json=1&page_size=8&fields=code,product_name,brands,image_front_small_url`;
      const res = await fetch(url);
      const data = await res.json();
      const products = (data.products || []).filter((p) => p.product_name && p.code);
      if (products.length === 0) {
        resultsEl.innerHTML = `<div class="empty-state"><p>No matches — try different words, or just type the name below.</p></div>`;
        return;
      }
      resultsEl.innerHTML = '';
      products.forEach((p) => {
        const row = document.createElement('div');
        row.className = 'row-item';
        row.style.cursor = 'pointer';
        row.innerHTML = `
          ${p.image_front_small_url ? `<img class="row-thumb" src="${p.image_front_small_url}" alt="">` : `<div class="row-thumb" style="display:flex;align-items:center;justify-content:center;">🥫</div>`}
          <div class="row-main">
            <div class="row-title">${toolkitEscapeHtml(p.product_name)}</div>
            <div class="row-sub">${toolkitEscapeHtml(p.brands || '')}</div>
          </div>
        `;
        row.addEventListener('click', async () => {
          resultsEl.innerHTML = `<div class="empty-state"><p>Loading details…</p></div>`;
          await handleBarcodeFound(p.code);
        });
        resultsEl.appendChild(row);
      });
    } catch (e) {
      resultsEl.innerHTML = `<div class="empty-state"><p>Search needs an internet connection.</p></div>`;
    }
  }

  document.getElementById('item-save-btn').addEventListener('click', async () => {
    const name = document.getElementById('item-name').value.trim();
    if (!name) { toolkitToast('Enter an item name', { danger: true }); return; }
    const existing = editingId ? await dbGet('pantry', editingId) : null;
    const item = {
      id: editingId || toolkitId(),
      name,
      brand: document.getElementById('item-brand').value.trim(),
      category: document.getElementById('item-category').value,
      qty,
      lowStock: document.getElementById('item-lowstock').checked,
      barcode: pendingBarcode || (existing ? existing.barcode : null),
      imageDataUrl: pendingImage || (existing ? existing.imageDataUrl : null),
      nutrition: pendingNutrition || (existing ? existing.nutrition : null),
      ingredientsText: pendingIngredients || (existing ? existing.ingredientsText : null),
      allergens: pendingAllergens || (existing ? existing.allergens : null),
      addedAt: existing ? existing.addedAt : Date.now(),
    };
    await dbPut('pantry', item);
    const addedToList = await syncShoppingForPantryItem(item);
    closeItemModal();
    toolkitToast(addedToList ? 'Pantry updated — added to shopping list' : 'Pantry updated');
    refresh();
  });

  // Keep the shopping list in sync with which pantry items are marked "running low".
  // Items marked low stock get a linked shopping-list entry (auto-added if missing);
  // items no longer low stock have their linked entry removed, unless it's already checked off.
  async function syncShoppingForPantryItem(item) {
    const linked = (await dbGetAll('shopping')).filter((s) => s.pantryId === item.id);
    if (item.lowStock) {
      if (linked.length === 0) {
        await dbPut('shopping', {
          id: toolkitId(),
          name: item.name,
          qty: 1,
          note: item.brand || '',
          checked: false,
          addedAt: Date.now(),
          pantryId: item.id,
        });
        return true;
      }
      for (const s of linked) {
        if (s.name !== item.name) { s.name = item.name; await dbPut('shopping', s); }
      }
      return false;
    }
    for (const s of linked) {
      if (!s.checked) await dbDelete('shopping', s.id);
    }
    return false;
  }

  document.getElementById('item-delete-btn').addEventListener('click', async () => {
    if (editingId) { await dbDelete('pantry', editingId); toolkitToast('Item removed'); }
    closeItemModal();
    refresh();
  });

  // ---------- Barcode scanning (html5-qrcode — proven reliable on iPhone/Safari) ----------
  let html5QrCode = null;

  document.getElementById('scan-btn').addEventListener('click', startScan);
  document.getElementById('scan-cancel-btn').addEventListener('click', () => stopScan(true));

  function scanFormats() {
    if (typeof Html5QrcodeSupportedFormats === 'undefined') return undefined;
    return [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR,
    ];
  }

  function scanConfig() {
    return {
      fps: 10,
      qrbox: { width: 260, height: 140 },
      formatsToSupport: scanFormats(),
      // Ask for the highest resolution the camera offers — the default stream
      // resolution some browsers pick is too low to resolve small, dense
      // retail barcodes at a normal scanning distance.
      videoConstraints: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
      },
    };
  }

  async function onScanSuccess(decodedText) {
    const value = String(decodedText || '').trim();
    if (!value) return;
    try { navigator.vibrate && navigator.vibrate(70); } catch (e) {}
    const statusEl = document.getElementById('scan-status');
    statusEl.textContent = 'Found it — looking up product…';
    stopScan(false);
    await handleBarcodeFound(value);
  }

  async function startScan() {
    const statusEl = document.getElementById('scan-status');
    if (typeof Html5Qrcode === 'undefined') {
      toolkitToast('Scanner library failed to load — check your connection, or add the item manually.', { danger: true, duration: 3500 });
      openItemModal();
      return;
    }
    scanModal.classList.add('show');
    statusEl.textContent = 'Starting camera…';
    document.getElementById('manual-barcode-input').value = '';
    document.getElementById('reader').innerHTML = '';
    html5QrCode = new Html5Qrcode('reader');
    const config = scanConfig();
    try {
      const devices = await Html5Qrcode.getCameras();
      if (!devices || !devices.length) throw new Error('No camera found');
      const back = devices.find((d) => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
      statusEl.textContent = 'Point your camera at the barcode';
      await html5QrCode.start(back.id, config, onScanSuccess, () => {});
    } catch (err) {
      try {
        statusEl.textContent = 'Point your camera at the barcode';
        await html5QrCode.start({ facingMode: 'environment' }, config, onScanSuccess, () => {});
      } catch (err2) {
        statusEl.textContent = 'Camera access was blocked — check your browser permissions, or add the item manually.';
      }
    }
  }

  function stopScan(hide) {
    if (html5QrCode) {
      const inst = html5QrCode;
      html5QrCode = null;
      try { inst.stop().then(() => inst.clear()).catch(() => {}); } catch (e) {}
    }
    if (hide) scanModal.classList.remove('show');
  }

  async function submitManualBarcode() {
    const input = document.getElementById('manual-barcode-input');
    const val = input.value.trim();
    if (!val) { toolkitToast('Type the barcode number first', { danger: true }); return; }
    document.getElementById('scan-status').textContent = 'Looking up product…';
    stopScan(false);
    await handleBarcodeFound(val);
  }
  document.getElementById('manual-barcode-btn').addEventListener('click', submitManualBarcode);
  document.getElementById('manual-barcode-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitManualBarcode();
  });

  async function handleBarcodeFound(barcode) {
    pendingBarcode = barcode;
    pendingImage = null;
    pendingNutrition = null;
    pendingIngredients = null;
    pendingAllergens = null;
    let name = '';
    let brand = '';
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json`);
      const data = await res.json();
      if (data.status === 1 && data.product) {
        const p = data.product;
        name = p.product_name || '';
        brand = p.brands || '';
        if (p.image_front_small_url) pendingImage = p.image_front_small_url;

        if (p.nutriments) {
          const nut = p.nutriments;
          const nutrition = {
            calories: nut['energy-kcal_100g'],
            protein: nut['proteins_100g'],
            carbs: nut['carbohydrates_100g'],
            sugar: nut['sugars_100g'],
            fat: nut['fat_100g'],
            sodium: nut['sodium_100g'],
            servingSize: p.serving_size || null,
          };
          const hasAnyValue = Object.values(nutrition).some((v) => typeof v === 'number');
          if (hasAnyValue) pendingNutrition = nutrition;
        }

        pendingIngredients = p.ingredients_text_en || p.ingredients_text || null;

        if (p.allergens_tags && p.allergens_tags.length) {
          pendingAllergens = p.allergens_tags.map((t) => t.replace(/^\w+:/, '').replace(/-/g, ' '));
        }
      }
    } catch (e) { /* offline or lookup failed — fall back to manual entry */ }

    scanModal.classList.remove('show');
    openItemModal();
    document.getElementById('item-name').value = name;
    document.getElementById('item-brand').value = brand;
    if (!name) {
      toolkitToast('Product not found in the database — fill in the details manually');
    }
  }

  // ---------- List rendering ----------
  async function refresh() {
    const items = (await dbGetAll('pantry')).sort((a, b) => {
      if (!!a.lowStock !== !!b.lowStock) return a.lowStock ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    const listEl = document.getElementById('pantry-list');
    listEl.innerHTML = '';
    if (items.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🥫</div><p>Your pantry is empty.</p><p>Scan a barcode or add an item manually.</p></div>`;
      return;
    }
    items.forEach((item) => {
      const row = document.createElement('div');
      row.className = 'row-item';
      row.innerHTML = `
        ${item.imageDataUrl ? `<img class="row-thumb" src="${item.imageDataUrl}" alt="">` : `<div class="row-thumb" style="display:flex;align-items:center;justify-content:center;">🥫</div>`}
        <div class="row-main">
          <div class="row-title">${toolkitEscapeHtml(item.name)}</div>
          <div class="row-sub">${item.brand ? toolkitEscapeHtml(item.brand) + ' · ' : ''}${item.category} · Qty ${item.qty}${item.lowStock ? ' · <span class="chip low-badge">Running low</span>' : ''}${item.allergens && item.allergens.length ? ' · <span class="chip danger">⚠ ' + item.allergens.slice(0, 2).map(toolkitEscapeHtml).join(', ') + (item.allergens.length > 2 ? '…' : '') + '</span>' : ''}</div>
        </div>
        <button class="icon-btn" aria-label="Add to shopping list" data-add>🛒</button>
        <button class="icon-btn" aria-label="Edit item" data-edit>✎</button>
      `;
      row.querySelector('[data-edit]').addEventListener('click', () => openItemModal(item));
      row.querySelector('[data-add]').addEventListener('click', async () => {
        await dbPut('shopping', {
          id: toolkitId(),
          name: item.name,
          qty: 1,
          note: item.brand || '',
          checked: false,
          addedAt: Date.now(),
        });
        toolkitToast(`Added "${item.name}" to shopping list`);
      });
      listEl.appendChild(row);
    });
  }

  refresh();
</script>
</body>
</html>
