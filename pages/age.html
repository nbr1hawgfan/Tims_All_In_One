<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Age Calculator — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  .age-hero { text-align: center; margin: 6px 0 18px; }
  .age-hero .num { font-family: var(--font-mono); font-size: 3rem; font-weight: 700; color: var(--primary-dark); line-height: 1; }
  .age-hero .sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-box { background: var(--primary-wash); border-radius: var(--radius-md); padding: 14px; text-align:center; }
  .stat-box .num { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 600; color: var(--primary-dark); }
  .stat-box .lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
</style>
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Age Calculator</h1></div>
</header>

<main class="shell">
  <div class="card">
    <label for="birth-date">Birth date</label>
    <input type="date" id="birth-date">
  </div>

  <div id="results" style="display:none;">
    <div class="age-hero">
      <div class="num" id="out-age">—</div>
      <div class="sub" id="out-age-sub">years old</div>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div class="num" id="out-days-alive">—</div>
        <div class="lbl">Days lived</div>
      </div>
      <div class="stat-box">
        <div class="num" id="out-weeks-alive">—</div>
        <div class="lbl">Weeks lived</div>
      </div>
      <div class="stat-box">
        <div class="num" id="out-born-day">—</div>
        <div class="lbl">Born on a</div>
      </div>
      <div class="stat-box">
        <div class="num" id="out-next-bday">—</div>
        <div class="lbl">Days to next birthday</div>
      </div>
    </div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🎂</div>
    <p>Pick a birth date above to see the breakdown.</p>
  </div>
</main>

<script src="../js/app.js"></script>
<script>
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const birthInput = document.getElementById('birth-date');

  function parseLocalDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function recalc() {
    const resultsEl = document.getElementById('results');
    const emptyEl = document.getElementById('empty-state');
    if (!birthInput.value) { resultsEl.style.display = 'none'; emptyEl.style.display = ''; return; }

    const birth = parseLocalDate(birthInput.value);
    const today = new Date();
    today.setHours(0,0,0,0);
    birth.setHours(0,0,0,0);

    if (birth > today) {
      toolkitToast('That date is in the future', { danger: true });
      resultsEl.style.display = 'none';
      emptyEl.style.display = '';
      return;
    }

    // Years / months / days breakdown
    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    let days = today.getDate() - birth.getDate();
    if (days < 0) {
      months -= 1;
      const daysInPrevMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
      days += daysInPrevMonth;
    }
    if (months < 0) {
      years -= 1;
      months += 12;
    }

    document.getElementById('out-age').textContent = years;
    document.getElementById('out-age-sub').textContent = `${months} month${months === 1 ? '' : 's'}, ${days} day${days === 1 ? '' : 's'} old`;

    const totalDays = Math.round((today - birth) / 86400000);
    document.getElementById('out-days-alive').textContent = totalDays.toLocaleString();
    document.getElementById('out-weeks-alive').textContent = Math.floor(totalDays / 7).toLocaleString();
    document.getElementById('out-born-day').textContent = DAY_NAMES[birth.getDay()];

    let nextBday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
    if (nextBday < today) nextBday = new Date(today.getFullYear() + 1, birth.getMonth(), birth.getDate());
    const daysToNext = Math.round((nextBday - today) / 86400000);
    document.getElementById('out-next-bday').textContent = daysToNext === 0 ? '🎉 Today!' : daysToNext.toLocaleString();

    resultsEl.style.display = '';
    emptyEl.style.display = 'none';
  }

  birthInput.addEventListener('input', recalc);
</script>
</body>
</html>
