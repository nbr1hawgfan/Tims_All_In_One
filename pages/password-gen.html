<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Password Generator — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  .pw-output {
    background: var(--primary-dark); color: #fff; border-radius: var(--radius-md);
    padding: 18px; font-family: var(--font-mono); font-size: 1.25rem; letter-spacing: 0.03em;
    word-break: break-all; text-align: center; margin-bottom: 14px;
  }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 999px; cursor: pointer; transition: 0.15s; }
  .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.15s; }
  input:checked + .slider { background: var(--primary); }
  input:checked + .slider::before { transform: translateX(18px); }
  .strength-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin-bottom: 6px; }
  .strength-fill { height: 100%; border-radius: 3px; transition: width 0.15s ease, background 0.15s ease; }
</style>
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Password Generator</h1></div>
</header>

<main class="shell">
  <div class="pw-output mono" id="pw-output">••••••••••••</div>
  <div class="btn-row" style="margin-bottom:18px;">
    <button class="btn secondary" id="copy-btn" style="flex:1;">Copy</button>
    <button class="btn" id="regen-btn" style="flex:1;">Generate new</button>
  </div>

  <div class="card">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="helper-text" id="strength-label" style="margin-bottom:14px;">Strength</div>

    <label for="length-slider">Length: <span id="length-out">16</span></label>
    <input type="range" id="length-slider" min="6" max="48" value="16" style="width:100%; margin-bottom:16px;">

    <div class="toggle-row">
      <span>Uppercase (A–Z)</span>
      <label class="switch"><input type="checkbox" id="opt-upper" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Lowercase (a–z)</span>
      <label class="switch"><input type="checkbox" id="opt-lower" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Numbers (0–9)</span>
      <label class="switch"><input type="checkbox" id="opt-numbers" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Symbols (!@#$…)</span>
      <label class="switch"><input type="checkbox" id="opt-symbols" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Avoid ambiguous (l, 1, O, 0)</span>
      <label class="switch"><input type="checkbox" id="opt-ambiguous"><span class="slider"></span></label>
    </div>
  </div>
</main>

<script src="../js/app.js"></script>
<script>
  const CHARSETS = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()-_=+[]{};:,.?',
  };
  const AMBIGUOUS = /[lI1O0]/g;

  const lengthSlider = document.getElementById('length-slider');
  const lengthOut = document.getElementById('length-out');
  const output = document.getElementById('pw-output');

  function secureRandomInt(max) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function generate() {
    const length = parseInt(lengthSlider.value, 10);
    const opts = {
      upper: document.getElementById('opt-upper').checked,
      lower: document.getElementById('opt-lower').checked,
      numbers: document.getElementById('opt-numbers').checked,
      symbols: document.getElementById('opt-symbols').checked,
    };
    const avoidAmbiguous = document.getElementById('opt-ambiguous').checked;

    let pools = [];
    Object.keys(opts).forEach((key) => {
      if (opts[key]) {
        let chars = CHARSETS[key];
        if (avoidAmbiguous) chars = chars.replace(AMBIGUOUS, '');
        if (chars) pools.push(chars);
      }
    });

    if (pools.length === 0) {
      output.textContent = 'Pick at least one character type';
      return;
    }

    const allChars = pools.join('');
    let result = '';
    // Guarantee at least one char from each selected pool, then fill the rest randomly.
    pools.forEach((pool) => { result += pool[secureRandomInt(pool.length)]; });
    for (let i = result.length; i < length; i++) {
      result += allChars[secureRandomInt(allChars.length)];
    }
    // shuffle
    result = result.split('').sort(() => secureRandomInt(3) - 1).join('').slice(0, length);

    output.textContent = result;
    updateStrength(result, pools.length, allChars.length);
  }

  function updateStrength(pw, poolCount, alphabetSize) {
    const bitsPerChar = Math.log2(alphabetSize || 1);
    const entropy = bitsPerChar * pw.length;
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let pct, color, text;
    if (entropy < 40) { pct = 25; color = 'var(--danger)'; text = 'Weak — try a longer password'; }
    else if (entropy < 65) { pct = 55; color = 'var(--accent)'; text = 'Okay — could be stronger'; }
    else if (entropy < 90) { pct = 80; color = 'var(--primary-light)'; text = 'Strong'; }
    else { pct = 100; color = 'var(--success)'; text = 'Very strong'; }
    fill.style.width = pct + '%';
    fill.style.background = color;
    label.textContent = `${text} (~${Math.round(entropy)} bits)`;
  }

  lengthSlider.addEventListener('input', () => {
    lengthOut.textContent = lengthSlider.value;
    generate();
  });
  document.querySelectorAll('.toggle-row input').forEach((el) => el.addEventListener('change', generate));
  document.getElementById('regen-btn').addEventListener('click', generate);
  document.getElementById('copy-btn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(output.textContent);
      toolkitToast('Password copied');
    } catch {
      toolkitToast('Could not copy — select and copy manually', { danger: true });
    }
  });

  generate();
</script>
</body>
</html>
