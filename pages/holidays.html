<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Public Holidays — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Public Holidays</h1></div>
</header>

<main class="shell">
  <div class="card">
    <div class="field-row">
      <div>
        <label for="country-select">Country</label>
        <select id="country-select"></select>
      </div>
      <div>
        <label for="year-input">Year</label>
        <input type="number" id="year-input" inputmode="numeric" step="1">
      </div>
    </div>
    <button class="btn block" id="load-btn">Show holidays</button>
  </div>

  <div class="result-panel" id="next-panel" style="display:none;">
    <div class="label">Next holiday</div>
    <div class="big-number" id="out-next-name" style="font-size:1.4rem;">—</div>
    <div class="helper-text" id="out-next-date" style="margin:6px 0 0;"></div>
  </div>

  <div class="shelf-label" id="list-label" style="display:none;">Full list</div>
  <div class="row-list" id="holiday-list"></div>
</main>

<script src="../js/app.js"></script>
<script>
  const COUNTRIES = {
    US: 'United States', CA: 'Canada', GB: 'United Kingdom', AU: 'Australia',
    DE: 'Germany', FR: 'France', MX: 'Mexico', IE: 'Ireland', IT: 'Italy',
    ES: 'Spain', NL: 'Netherlands', BR: 'Brazil', JP: 'Japan', IN: 'India',
    NZ: 'New Zealand', SE: 'Sweden', NO: 'Norway', DK: 'Denmark', CH: 'Switzerland',
    AT: 'Austria', BE: 'Belgium', PT: 'Portugal', PL: 'Poland', FI: 'Finland',
    ZA: 'South Africa', KR: 'South Korea', SG: 'Singapore',
  };

  const countrySelect = document.getElementById('country-select');
  const yearInput = document.getElementById('year-input');

  Object.entries(COUNTRIES).forEach(([code, name]) => {
    countrySelect.appendChild(new Option(name, code));
  });
  countrySelect.value = 'US';
  yearInput.value = new Date().getFullYear();

  async function loadHolidays() {
    const country = countrySelect.value;
    const year = parseInt(yearInput.value, 10) || new Date().getFullYear();
    const listEl = document.getElementById('holiday-list');
    const listLabel = document.getElementById('list-label');
    listEl.innerHTML = `<div class="empty-state"><p>Loading…</p></div>`;
    listLabel.style.display = '';

    try {
      const [holidaysRes, nextRes] = await Promise.all([
        fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/${country}`),
        fetch(`https://date.nager.at/api/v3/NextPublicHolidays/${country}`),
      ]);
      const holidays = await holidaysRes.json();
      const next = await nextRes.json();

      const nextPanel = document.getElementById('next-panel');
      if (Array.isArray(next) && next.length > 0) {
        const n = next[0];
        document.getElementById('out-next-name').textContent = n.localName || n.name;
        const d = new Date(n.date + 'T00:00:00');
        const today = new Date(); today.setHours(0,0,0,0);
        const daysAway = Math.round((d - today) / 86400000);
        document.getElementById('out-next-date').textContent =
          `${d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })} · ${daysAway} day${daysAway === 1 ? '' : 's'} away`;
        nextPanel.style.display = '';
      } else {
        nextPanel.style.display = 'none';
      }

      listEl.innerHTML = '';
      if (!Array.isArray(holidays) || holidays.length === 0) {
        listEl.innerHTML = `<div class="empty-state"><p>No holiday data for that country/year.</p></div>`;
        return;
      }
      holidays.forEach((h) => {
        const d = new Date(h.date + 'T00:00:00');
        const row = document.createElement('div');
        row.className = 'row-item';
        row.innerHTML = `
          <div class="row-main">
            <div class="row-title">${toolkitEscapeHtml(h.localName || h.name)}</div>
            <div class="row-sub">${d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })}${h.name !== h.localName ? ' · ' + toolkitEscapeHtml(h.name) : ''}</div>
          </div>
          ${h.global === false ? '<span class="chip accent">Regional</span>' : ''}
        `;
        listEl.appendChild(row);
      });
    } catch (e) {
      listEl.innerHTML = `<div class="empty-state"><p>Could not load holidays — check your connection.</p></div>`;
    }
  }

  document.getElementById('load-btn').addEventListener('click', loadHolidays);
  loadHolidays();
</script>
</body>
</html>
