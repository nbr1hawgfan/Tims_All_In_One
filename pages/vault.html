<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Secure Logins — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,40,50,0.5); display: none; align-items: flex-start; justify-content: center; z-index: 50; padding: 20px 0; overflow-y: auto; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; width: 92%; max-width: 480px; }
  .pw-reveal { display: flex; gap: 8px; align-items: center; }
  .pw-reveal input { margin-bottom: 0; }
</style>
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Secure Logins</h1></div>
</header>

<main class="shell">

  <!-- Locked state -->
  <div id="lock-view" class="lock-screen">
    <div class="lock-icon">🔒</div>
    <h3 id="lock-title">Vault locked</h3>
    <p class="helper-text" id="lock-sub" style="text-align:center;">Enter your vault passphrase to continue.</p>
    <input type="password" id="passphrase-input" placeholder="Passphrase" style="text-align:center;">
    <button class="btn block" id="unlock-btn">Unlock</button>
    <p class="helper-text" id="lost-passphrase-link" style="text-align:center; cursor:pointer; text-decoration:underline; display:none;">I forgot my passphrase</p>
  </div>

  <!-- Unlocked state -->
  <div id="vault-view" style="display:none;">
    <div class="btn-row" style="margin-bottom:18px;">
      <button class="btn" id="new-login-btn" style="flex:1;">+ New login</button>
      <button class="btn secondary" id="lock-btn">Lock</button>
    </div>
    <div class="row-list" id="logins-list"></div>
  </div>
</main>

<!-- Add/edit login modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-box">
    <h3 id="login-modal-title">Add login</h3>
    <label for="login-site">Site or app</label>
    <input type="text" id="login-site" placeholder="e.g. Chase, Netflix">
    <label for="login-username">Username / email</label>
    <input type="text" id="login-username" placeholder="e.g. you@email.com">
    <label for="login-password">Password</label>
    <div class="pw-reveal">
      <input type="password" id="login-password" placeholder="Password">
      <button class="icon-btn" id="toggle-pw-btn" type="button" aria-label="Show password">👁</button>
    </div>
    <label for="login-notes">Notes (optional)</label>
    <textarea id="login-notes" rows="2" placeholder="Security questions, PIN, etc."></textarea>
    <div class="btn-row">
      <button class="btn secondary" id="login-cancel-btn" style="flex:1;">Cancel</button>
      <button class="btn danger" id="login-delete-btn" style="display:none;">Delete</button>
      <button class="btn" id="login-save-btn" style="flex:1;">Save</button>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script src="../js/secure.js"></script>
<script>
  let editingId = null;

  async function init() {
    const setUp = await toolkitSecure.isSetUp();
    document.getElementById('lock-title').textContent = setUp ? 'Vault locked' : 'Set up your vault';
    document.getElementById('lock-sub').textContent = setUp
      ? 'Enter your vault passphrase to continue.'
      : 'Choose a passphrase to encrypt your logins and ID cards. This same passphrase unlocks both. There is no reset — if it\'s lost, the vault must be wiped and started over.';
    document.getElementById('unlock-btn').textContent = setUp ? 'Unlock' : 'Create vault';
    document.getElementById('lost-passphrase-link').style.display = setUp ? '' : 'none';
  }

  document.getElementById('unlock-btn').addEventListener('click', async () => {
    const pass = document.getElementById('passphrase-input').value;
    if (!pass || pass.length < 4) { toolkitToast('Passphrase is too short', { danger: true }); return; }
    const setUp = await toolkitSecure.isSetUp();
    try {
      if (setUp) {
        await toolkitSecure.unlock(pass);
      } else {
        await toolkitSecure.setup(pass);
        toolkitToast('Vault created');
      }
      document.getElementById('passphrase-input').value = '';
      showVault();
    } catch (e) {
      toolkitToast(e.message, { danger: true });
    }
  });

  document.getElementById('lost-passphrase-link').addEventListener('click', async () => {
    if (confirm('This permanently deletes all saved logins and ID cards on this device — there is no way to recover them. Continue?')) {
      await toolkitSecure.resetVault();
      toolkitToast('Vault wiped — set a new passphrase');
      init();
    }
  });

  document.getElementById('lock-btn').addEventListener('click', () => {
    toolkitSecure.lock();
    document.getElementById('vault-view').style.display = 'none';
    document.getElementById('lock-view').style.display = '';
    init();
  });

  async function showVault() {
    document.getElementById('lock-view').style.display = 'none';
    document.getElementById('vault-view').style.display = '';
    refresh();
  }

  const loginModal = document.getElementById('login-modal');
  function openLoginModal(entry = null, decrypted = null) {
    editingId = entry ? entry.id : null;
    document.getElementById('login-modal-title').textContent = entry ? 'Edit login' : 'Add login';
    document.getElementById('login-site').value = decrypted ? decrypted.site : '';
    document.getElementById('login-username').value = decrypted ? decrypted.username : '';
    document.getElementById('login-password').value = decrypted ? decrypted.password : '';
    document.getElementById('login-notes').value = decrypted ? decrypted.notes : '';
    document.getElementById('login-password').type = 'password';
    document.getElementById('login-delete-btn').style.display = entry ? '' : 'none';
    loginModal.classList.add('show');
  }
  function closeLoginModal() { loginModal.classList.remove('show'); }

  document.getElementById('new-login-btn').addEventListener('click', () => openLoginModal());
  document.getElementById('login-cancel-btn').addEventListener('click', closeLoginModal);
  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeLoginModal(); });
  document.getElementById('toggle-pw-btn').addEventListener('click', () => {
    const pwInput = document.getElementById('login-password');
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-save-btn').addEventListener('click', async () => {
    const site = document.getElementById('login-site').value.trim();
    if (!site) { toolkitToast('Enter a site or app name', { danger: true }); return; }
    if (!toolkitSecure.isUnlocked()) {
      toolkitToast('Vault session timed out — please unlock again and retry', { danger: true, duration: 3500 });
      closeLoginModal();
      document.getElementById('vault-view').style.display = 'none';
      document.getElementById('lock-view').style.display = '';
      init();
      return;
    }
    const saveBtn = document.getElementById('login-save-btn');
    saveBtn.disabled = true;
    try {
      const payload = {
        site,
        username: document.getElementById('login-username').value.trim(),
        password: document.getElementById('login-password').value,
        notes: document.getElementById('login-notes').value.trim(),
      };
      const enc = await toolkitSecure.encryptJson(payload);
      const now = Date.now();
      const existing = editingId ? await dbGet('vault_items', editingId) : null;
      await dbPut('vault_items', {
        id: editingId || toolkitId(),
        kind: 'login',
        cipherText: enc.cipherText,
        iv: enc.iv,
        createdAt: existing ? existing.createdAt : now,
        updatedAt: now,
      });
      closeLoginModal();
      toolkitToast('Login saved');
      refresh();
    } catch (e) {
      console.error('Login save failed:', e);
      toolkitToast('Could not save the login: ' + e.message, { danger: true, duration: 4000 });
    } finally {
      saveBtn.disabled = false;
    }
  });

  document.getElementById('login-delete-btn').addEventListener('click', async () => {
    if (editingId) { await dbDelete('vault_items', editingId); toolkitToast('Login deleted'); }
    closeLoginModal();
    refresh();
  });

  async function refresh() {
    const all = (await dbGetAll('vault_items')).filter((r) => r.kind === 'login').sort((a, b) => b.updatedAt - a.updatedAt);
    const listEl = document.getElementById('logins-list');
    listEl.innerHTML = '';
    if (all.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><p>No logins saved yet.</p><p>Tap "New login" to add one.</p></div>`;
      return;
    }
    for (const record of all) {
      let decrypted;
      try { decrypted = await toolkitSecure.decryptJson(record); } catch { continue; }
      const row = document.createElement('div');
      row.className = 'row-item';
      row.style.cursor = 'pointer';
      row.innerHTML = `
        <div class="row-main">
          <div class="row-title">${toolkitEscapeHtml(decrypted.site)}</div>
          <div class="row-sub">${toolkitEscapeHtml(decrypted.username || 'No username saved')}</div>
        </div>
        <button class="icon-btn" data-copy aria-label="Copy password">📋</button>
      `;
      row.querySelector('[data-copy]').addEventListener('click', async (e) => {
        e.stopPropagation();
        try { await navigator.clipboard.writeText(decrypted.password); toolkitToast('Password copied'); }
        catch { toolkitToast('Could not copy', { danger: true }); }
      });
      row.addEventListener('click', () => openLoginModal(record, decrypted));
      listEl.appendChild(row);
    }
  }

  init();
</script>
</body>
</html>
