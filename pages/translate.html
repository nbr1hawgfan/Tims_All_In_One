<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Translator — Personal Toolkit</title>
<meta name="theme-color" content="#0a5870">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  .lang-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .lang-row select { margin-bottom: 0; flex: 1; }
  .swap-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--primary-wash); color: var(--primary-dark); font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  }
  textarea#src-text { min-height: 100px; }
  .translation-box {
    background: var(--primary-wash); border-radius: var(--radius-md); padding: 16px;
    font-size: 1.1rem; color: var(--primary-dark); min-height: 60px; margin-bottom: 12px;
  }
  .translation-box.placeholder { color: var(--text-muted); font-style: italic; font-size: 0.95rem; }
</style>
</head>
<body data-sw-path="../sw.js">

<header class="app-header">
  <a href="../index.html" class="back-link" aria-label="Back to home">←</a>
  <div><h1>Translator</h1></div>
</header>

<main class="shell">
  <div class="card">
    <div class="lang-row">
      <select id="from-lang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="vi">Vietnamese</option>
        <option value="ru">Russian</option>
      </select>
      <button class="swap-btn" id="swap-btn" aria-label="Swap languages">⇄</button>
      <select id="to-lang">
        <option value="es">Spanish</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="vi">Vietnamese</option>
        <option value="ru">Russian</option>
      </select>
    </div>

    <label for="src-text">Text to translate</label>
    <textarea id="src-text" placeholder="Type something to translate…"></textarea>

    <div class="btn-row" style="margin-bottom:6px;">
      <button class="btn" id="translate-btn" style="flex:1;">Translate</button>
      <button class="icon-btn" id="speak-src-btn" aria-label="Read original aloud" title="Read original aloud">🔊</button>
    </div>
  </div>

  <div class="shelf-label">Translation</div>
  <div class="translation-box placeholder" id="translation-box">Your translation will appear here.</div>
  <button class="btn secondary block" id="speak-out-btn" disabled>🔊 Read translation aloud</button>

  <p class="helper-text" style="margin-top:18px;">
    Translations come from a free public translation service and read-aloud uses your device's built-in voices — both need an internet connection except for text you've already translated once in this session.
  </p>
</main>

<script src="../js/app.js"></script>
<script>
  const fromLang = document.getElementById('from-lang');
  const toLang = document.getElementById('to-lang');
  const srcText = document.getElementById('src-text');
  const box = document.getElementById('translation-box');
  const speakOutBtn = document.getElementById('speak-out-btn');
  let lastTranslation = '';

  document.getElementById('swap-btn').addEventListener('click', () => {
    const f = fromLang.value;
    fromLang.value = toLang.value;
    toLang.value = f;
  });

  document.getElementById('translate-btn').addEventListener('click', async () => {
    const text = srcText.value.trim();
    if (!text) { toolkitToast('Type something to translate', { danger: true }); return; }
    box.textContent = 'Translating…';
    box.classList.add('placeholder');
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang.value}|${toLang.value}`;
      const res = await fetch(url);
      const data = await res.json();
      const translated = data?.responseData?.translatedText;
      if (translated) {
        lastTranslation = translated;
        box.textContent = translated;
        box.classList.remove('placeholder');
        speakOutBtn.disabled = false;
      } else {
        box.textContent = 'Could not translate that — try again.';
        box.classList.add('placeholder');
      }
    } catch (e) {
      box.textContent = 'Translation needs an internet connection.';
      box.classList.add('placeholder');
    }
  });

  function speak(text, langCode) {
    if (!('speechSynthesis' in window)) {
      toolkitToast('Read-aloud isn\'t supported on this device', { danger: true });
      return;
    }
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode;
    speechSynthesis.speak(utter);
  }

  document.getElementById('speak-src-btn').addEventListener('click', () => {
    const text = srcText.value.trim();
    if (!text) return;
    speak(text, fromLang.value);
  });

  speakOutBtn.addEventListener('click', () => {
    if (lastTranslation) speak(lastTranslation, toLang.value);
  });
</script>
</body>
</html>
